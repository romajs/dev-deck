name: Release

on:
  workflow_run:
    workflows:
      - CI
    branches:
      - main
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.event.workflow_run.head_sha || github.sha }}
  cancel-in-progress: false

jobs:
  release:
    name: Publish GitHub Release
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: macos-14

    steps:
      - name: Check out release commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Resolve release metadata
        id: metadata
        run: |
          app_version="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' DevDeck/App/Info.plist)"
          tag="v${app_version}-${GITHUB_RUN_NUMBER}"
          echo "app_version=$app_version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "target_sha=${{ github.event.workflow_run.head_sha || github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Package app
        run: Scripts/package-release.sh "${{ steps.metadata.outputs.tag }}"

      - name: Create release tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git ls-remote --exit-code --tags origin "refs/tags/${{ steps.metadata.outputs.tag }}" >/dev/null 2>&1; then
            echo "Tag ${{ steps.metadata.outputs.tag }} already exists."
          else
            git tag -a "${{ steps.metadata.outputs.tag }}" \
              -m "Release ${{ steps.metadata.outputs.tag }}" \
              "${{ steps.metadata.outputs.target_sha }}"
            git push origin "${{ steps.metadata.outputs.tag }}"
          fi

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ steps.metadata.outputs.tag }}"
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" \
              "dist/DevDeck-$tag.zip" \
              "dist/DevDeck-$tag.zip.sha256" \
              --clobber
          else
            gh release create "$tag" \
              "dist/DevDeck-$tag.zip" \
              "dist/DevDeck-$tag.zip.sha256" \
              --target "${{ steps.metadata.outputs.target_sha }}" \
              --title "DevDeck $tag" \
              --notes "Automated unsigned macOS app bundle build for $tag."
          fi
