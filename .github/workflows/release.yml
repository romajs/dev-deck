name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing version tag to publish, for example v0.2.0
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.event.inputs.tag || github.ref_name || github.run_id }}
  cancel-in-progress: false

jobs:
  release:
    name: Publish GitHub Release
    runs-on: macos-14

    steps:
      - name: Check out release commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref_name }}

      - name: Resolve release metadata
        id: metadata
        run: |
          tag="${{ github.event.inputs.tag || github.ref_name }}"
          if [[ ! "$tag" =~ ^v[0-9]+(\.[0-9]+){1,2}([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Release tag must start with a semantic version-like value, for example v0.2.0." >&2
            exit 2
          fi
          app_version="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' DevDeck/App/Info.plist)"
          echo "app_version=$app_version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "target_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Package app
        run: Scripts/package-release.sh "${{ steps.metadata.outputs.tag }}"

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ steps.metadata.outputs.tag }}"
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" \
              "dist/DevDeck-$tag.zip" \
              "dist/DevDeck-$tag.zip.sha256" \
              --clobber
          else
            gh release create "$tag" \
              "dist/DevDeck-$tag.zip" \
              "dist/DevDeck-$tag.zip.sha256" \
              --target "${{ steps.metadata.outputs.target_sha }}" \
              --title "DevDeck $tag" \
              --notes "Automated universal ad-hoc signed macOS app bundle build for $tag. This build is not notarized yet."
          fi
