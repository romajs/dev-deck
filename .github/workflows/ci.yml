name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  build:
    name: Build app bundle
    runs-on: macos-14

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build app
        run: Scripts/build-app.sh

      - name: Validate app metadata
        run: |
          plutil -lint DevDeck/App/Info.plist
          plutil -lint .build/DevDeck.app/Contents/Info.plist

      - name: Validate universal signed app
        run: |
          lipo .build/DevDeck.app/Contents/MacOS/DevDeck -verify_arch arm64 x86_64
          lipo -info .build/DevDeck.app/Contents/MacOS/DevDeck
          codesign --verify --deep --strict --verbose=2 .build/DevDeck.app

      - name: Package release artifact
        run: |
          Scripts/package-release.sh ci
          cd dist
          shasum -a 256 -c DevDeck-ci.zip.sha256
